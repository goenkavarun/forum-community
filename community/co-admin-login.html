<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Co-Admin Login - India Digital Marketing Forum</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0B1B3E 0%, #FF6B00 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #0B1B3E, #FF6B00);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: white;
            margin: 0 auto 15px;
            font-weight: bold;
        }

        .login-header h1 {
            color: #0B1B3E;
            font-size: 1.8em;
            margin-bottom: 5px;
        }

        .login-header p {
            color: #999;
            font-size: 0.95em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #0B1B3E;
            font-weight: bold;
            font-size: 0.95em;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 5px;
            font-size: 1em;
            transition: all 0.3s;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #FF6B00;
            box-shadow: 0 0 8px rgba(255, 107, 0, 0.2);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #0B1B3E 0%, #FF6B00 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 107, 0, 0.4);
        }

        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .back-link a {
            color: #FF6B00;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.2s;
        }

        .back-link a:hover {
            color: #0B1B3E;
        }

        .info-box {
            background: #f0f8ff;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 4px solid #FF6B00;
        }

        .info-box p {
            color: #0B1B3E;
            font-size: 0.9em;
            line-height: 1.5;
        }

        .loading {
            display: none;
            text-align: center;
            color: #FF6B00;
            font-weight: bold;
        }

        @media (max-width: 500px) {
            .login-container {
                padding: 30px 20px;
            }

            .login-header h1 {
                font-size: 1.5em;
            }

            input[type="text"],
            input[type="password"] {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo">🟠</div>
            <h1>Co-Admin Login</h1>
            <p>India Digital Marketing Forum</p>
        </div>

        <div id="message" class="message"></div>

        <div class="info-box">
            <p>🔑 <strong>Co-Admin Access Only</strong></p>
            <p>Use your credentials to access the co-admin dashboard. You can approve/reject posts and view statistics.</p>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">Username:</label>
                <input 
                    type="text" 
                    id="username" 
                    placeholder="Enter your username"
                    required
                    autofocus
                >
            </div>

            <div class="form-group">
                <label for="password">Password:</label>
                <input 
                    type="password" 
                    id="password" 
                    placeholder="Enter your password"
                    required
                >
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
                🔓 Login
            </button>
        </form>

        <div class="loading" id="loading">
            ⏳ Logging in...
        </div>

        <div class="back-link">
            <p style="color: #999; font-size: 0.9em; margin-bottom: 10px;">← Not a co-admin?</p>
            <a href="index.html">Back to Forum</a>
        </div>
    </div>

    <script>
        const API_BASE = '/api';

        async function handleLogin(event) {
            event.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showMessage('❌ Username and password required', 'error');
                return;
            }

            const loginBtn = document.getElementById('loginBtn');
            const loading = document.getElementById('loading');

            loginBtn.disabled = true;
            loading.style.display = 'block';

            try {
                const response = await fetch(`${API_BASE}/co-admin/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.token) {
                    showMessage('✅ ' + data.message, 'success');
                    sessionStorage.setItem('coAdminToken', data.token);
                    
                    // Redirect to co-admin dashboard
                    setTimeout(() => {
                        window.location.href = 'co-admin.html';
                    }, 1500);
                } else {
                    showMessage('❌ ' + (data.error || 'Login failed'), 'error');
                    loginBtn.disabled = false;
                    loading.style.display = 'none';
                }
            } catch (error) {
                showMessage('❌ Error: ' + error.message, 'error');
                loginBtn.disabled = false;
                loading.style.display = 'none';
            }
        }

        function showMessage(msg, type) {
            const msgEl = document.getElementById('message');
            msgEl.textContent = msg;
            msgEl.className = `message ${type}`;
        }

        // Check if already logged in
        window.addEventListener('load', () => {
            const token = sessionStorage.getItem('coAdminToken');
            if (token) {
                window.location.href = 'co-admin.html';
            }
        });
    </script>
</body>
</html>
