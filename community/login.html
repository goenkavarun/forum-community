<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - India Digital Marketing Forum</title>
    <link rel="canonical" href="https://indiadigitalmarketingforum.org/community/login.html">
    <meta property="og:title" content="Login - India Digital Marketing Forum">
    <meta name="robots" content="noindex, nofollow">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0B1B3E 0%, #FF6B00 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container { max-width: 450px; width: 100%; }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h2 { color: #0B1B3E; margin-bottom: 30px; text-align: center; font-size: 1.8em; }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            margin-bottom: 8px;
            color: #0B1B3E;
            font-weight: bold;
            font-size: 0.95em;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #FF6B00;
            box-shadow: 0 0 5px rgba(255,107,0,0.3);
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #0B1B3E 0%, #FF6B00 100%);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
            transition: transform 0.2s;
            margin-top: 10px;
        }
        button:hover { transform: translateY(-2px); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .button-google { background: #4285F4; }
        .tab-switch {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        .tab-switch a {
            cursor: pointer;
            color: #FF6B00;
            text-decoration: underline;
            font-weight: bold;
        }
        .message {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { color: #FF6B00; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-box">
            <!-- LOGIN FORM -->
            <div id="loginForm" style="display: block;">
                <h2>🔐 Login</h2>
                <div id="loginMessage" class="message"></div>
                
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="loginEmail" placeholder="your@email.com">
                </div>
                
                <div class="form-group">
                    <label>Password:</label>
                    <input type="password" id="loginPassword" placeholder="Your password">
                </div>
                
                <button onclick="handleLogin()">🔓 Login</button>
                
                <div style="margin: 20px 0; text-align: center;">
                    <button class="button-google" onclick="handleGoogleLogin()">
                        🔐 Login with Google
                    </button>
                </div>
                
                <div class="tab-switch">
                    No account? <a onclick="switchTab('signup')">Sign up here</a>
                </div>
            </div>

            <!-- SIGNUP FORM -->
            <div id="signupForm" style="display: none;">
                <h2>📝 Sign Up</h2>
                <div id="signupMessage" class="message"></div>
                
                <div class="form-group">
                    <label>Username:</label>
                    <input type="text" id="signupUsername" placeholder="Choose username">
                </div>
                
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="signupEmail" placeholder="your@email.com">
                </div>
                
                <div class="form-group">
                    <label>Password:</label>
                    <input type="password" id="signupPassword" placeholder="Min 6 characters">
                </div>
                
                <button onclick="handleSignup()">📝 Create Account</button>
                
                <div class="tab-switch">
                    Already have account? <a onclick="switchTab('login')">Login here</a>
                </div>
            </div>

            <div class="back-link">
                <a href="/community/">← Back to Forum</a>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        const GOOGLE_CLIENT_ID = 'YOUR_GOOGLE_CLIENT_ID_HERE'; // REPLACE THIS!

        function switchTab(tab) {
            document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('signupForm').style.display = tab === 'signup' ? 'block' : 'none';
        }

        function showMessage(formType, message, type) {
            const msgEl = document.getElementById(formType + 'Message');
            msgEl.textContent = message;
            msgEl.className = 'message ' + type;
            setTimeout(() => { msgEl.className = 'message'; }, 5000);
        }

        async function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showMessage('login', '❌ Please fill all fields', 'error');
                return;
            }

            try {
                const response = await fetch(API_BASE + '/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('userToken', data.token);
                    localStorage.setItem('userId', data.userId);
                    localStorage.setItem('username', data.username);
                    showMessage('login', '✅ Login successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = '/community/';
                    }, 1500);
                } else {
                    showMessage('login', '❌ ' + data.error, 'error');
                }
            } catch (err) {
                showMessage('login', '❌ Error: ' + err.message, 'error');
            }
        }

        async function handleSignup() {
            const username = document.getElementById('signupUsername').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;

            if (!username || !email || !password) {
                showMessage('signup', '❌ Please fill all fields', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('signup', '❌ Password must be at least 6 characters', 'error');
                return;
            }

            try {
                const response = await fetch(API_BASE + '/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('signup', '✅ Signup successful! Check your email to verify.', 'success');
                    setTimeout(() => {
                        switchTab('login');
                    }, 2000);
                } else {
                    showMessage('signup', '❌ ' + data.error, 'error');
                }
            } catch (err) {
                showMessage('signup', '❌ Error: ' + err.message, 'error');
            }
        }

        function handleGoogleLogin() {
            if (GOOGLE_CLIENT_ID === '199736136937-ojo2hi5o6rvkvmbfd7edhfd2a3rdnkk7.apps.googleusercontent.com') {
                alert('⚠️ Google Client ID not configured yet. Please update the code!');
                return;
            }
            alert('🔐 Google OAuth coming soon!');
        }
    </script>
</body>
</html>
